name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  rust-portable:
    name: Rust portable checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libasound2-dev \
            libatk1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libpango1.0-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config
      - name: Install minimum supported Rust
        run: rustup toolchain install 1.89 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        working-directory: src-tauri
        run: cargo +1.89 fmt --check
      - name: Run portable Rust tests
        working-directory: src-tauri
        run: cargo +1.89 test --lib --no-default-features
      - name: Lint portable Rust target
        working-directory: src-tauri
        run: cargo +1.89 clippy --lib --no-default-features -- -D warnings
      - name: Compile portable Rust target
        working-directory: src-tauri
        run: cargo +1.89 build --release --no-default-features

  rust-macos:
    name: Rust portable checks (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Install minimum supported Rust
        run: rustup toolchain install 1.89 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        working-directory: src-tauri
        run: cargo +1.89 fmt --check
      - name: Run portable Rust tests
        working-directory: src-tauri
        run: cargo +1.89 test --lib --no-default-features
      - name: Lint portable Rust target
        working-directory: src-tauri
        run: cargo +1.89 clippy --lib --no-default-features -- -D warnings
      - name: Compile portable Rust target
        working-directory: src-tauri
        run: cargo +1.89 build --release --no-default-features

  rust-windows:
    name: Rust portable checks (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Install minimum supported Rust
        run: rustup toolchain install 1.89 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        working-directory: src-tauri
        run: cargo +1.89 fmt --check
      - name: Run portable Rust tests
        working-directory: src-tauri
        run: cargo +1.89 test --lib --no-default-features
      - name: Lint portable Rust target
        working-directory: src-tauri
        run: cargo +1.89 clippy --lib --no-default-features -- -D warnings
      - name: Compile portable Rust target
        working-directory: src-tauri
        run: cargo +1.89 build --release --no-default-features

  cuda-linux-nvidia:
    name: CUDA build checks (Linux/NVIDIA)
    # Self-hosted runners must never execute code supplied by an untrusted
    # fork. Repository PRs and trusted pushes still receive the GPU gate.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: [self-hosted, linux, x64, nvidia-cuda]
    timeout-minutes: 45
    env:
      # A repository variable points only at a runner-local, pinned Parakeet
      # test model. It is intentionally not a user model directory or secret.
      VOXIDE_CUDA_HOME: ${{ vars.VOXIDE_CUDA_HOME }}
      VOXIDE_PARAKEET_MODEL_DIR: ${{ vars.VOXIDE_PARAKEET_MODEL_DIR }}
      VOXIDE_SHERPA_ONNX_LIB_DIR: ${{ vars.VOXIDE_SHERPA_ONNX_LIB_DIR }}
      VOXIDE_PARAKEET_CUDA_LIB_DIRS: ${{ vars.VOXIDE_PARAKEET_CUDA_LIB_DIRS }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Verify NVIDIA/CUDA runner contract
        run: |
          test -x "$VOXIDE_CUDA_HOME/bin/nvcc"
          "$VOXIDE_CUDA_HOME/bin/nvcc" --version
          pkg-config --modversion alsa
          pkg-config --modversion gtk+-3.0
          test -n "$VOXIDE_PARAKEET_MODEL_DIR"
          test -f "$VOXIDE_PARAKEET_MODEL_DIR/test_wavs/en.wav"
          test -d "$VOXIDE_SHERPA_ONNX_LIB_DIR"
          test -n "$VOXIDE_PARAKEET_CUDA_LIB_DIRS"
      - name: Configure CUDA build environment
        run: |
          echo "CUDA_HOME=$VOXIDE_CUDA_HOME" >> "$GITHUB_ENV"
          echo "CUDAToolkit_ROOT=$VOXIDE_CUDA_HOME" >> "$GITHUB_ENV"
          echo "SHERPA_ONNX_LIB_DIR=$VOXIDE_SHERPA_ONNX_LIB_DIR" >> "$GITHUB_ENV"
          echo "PARAKEET_CUDA_LIB_DIRS=$VOXIDE_PARAKEET_CUDA_LIB_DIRS" >> "$GITHUB_ENV"
          echo "$VOXIDE_CUDA_HOME/bin" >> "$GITHUB_PATH"
      - name: Install minimum supported Rust
        run: rustup toolchain install 1.89 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        working-directory: src-tauri
        run: cargo +1.89 fmt --check
      - name: Audit resolved CUDA dependency graph
        working-directory: src-tauri
        run: cargo +1.89 tree --locked --features cuda --edges normal,build
      - name: Run CUDA Rust lifecycle tests
        working-directory: src-tauri
        run: cargo +1.89 test --lib --features cuda
      - name: Run CUDA model inference fixtures
        working-directory: src-tauri
        run: cargo +1.89 test --lib --features cuda cuda_model -- --ignored
      - name: Lint CUDA Rust target
        working-directory: src-tauri
        run: cargo +1.89 clippy --lib --features cuda -- -D warnings
      - name: Build CUDA release target
        working-directory: src-tauri
        run: cargo +1.89 build --release --features cuda
